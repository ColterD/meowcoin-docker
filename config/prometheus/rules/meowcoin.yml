# config/prometheus/rules/meowcoin.yml
groups:
- name: meowcoin
  rules:
  - alert: NodeOutOfSync
    expr: meowcoin_blocks_behind > 6
    for: 30m
    labels:
      severity: warning
    annotations:
      summary: "Meowcoin node out of sync"
      description: "Node is {{ $value }} blocks behind the network"

  - alert: LowPeerCount
    expr: meowcoin_connections < 3
    for: 15m
    labels:
      severity: warning
    annotations:
      summary: "Low peer connections"
      description: "Only {{ $value }} peers connected"

  - alert: MempoolFull
    expr: meowcoin_mempool_size > 10000
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "Memory pool filling up"
      description: "{{ $value }} transactions in mempool"

  - alert: NodeHighCPU
    expr: rate(process_cpu_seconds_total{job="meowcoin"}[5m]) > 0.8
    for: 10m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage"
      description: "Node CPU usage at {{ $value | humanizePercentage }}"