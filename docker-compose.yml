services:
  meowcoin:
    build: .
    image: meowcoin:latest
    container_name: meowcoin-node
    volumes:
      - meowcoin-data:/home/meowcoin/.meowcoin
      - ./config:/config
    ports:
      - "9766:9766"  # RPC port
      - "8788:8788"  # P2P port
    restart: unless-stopped

volumes:
  meowcoin-data: