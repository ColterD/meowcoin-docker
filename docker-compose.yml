services:
  # Dashboard Frontend
  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./packages/dashboard/public:/usr/share/nginx/html
      - ./config:/config:ro
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    restart: unless-stopped
    networks:
      - meowcoin-network

  # MeowCoin Node
  meowcoin-node:
    image: alpine:latest
    volumes:
      - meowcoin_data:/root/.meowcoin
      - meowcoin_config:/etc/meowcoin
    ports:
      - "9332:9332" # RPC port
      - "9333:9333" # P2P port
    environment:
      - MEOWCOIN_RPC_USER=${MEOWCOIN_RPC_USER:-meowcoinuser}
      - MEOWCOIN_RPC_PASSWORD=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}
    restart: unless-stopped
    networks:
      - meowcoin-network
    command: >
      /bin/sh -c "echo 'MeowCoin Node started.' && 
      mkdir -p /root/.meowcoin && 
      echo 'rpcuser=${MEOWCOIN_RPC_USER:-meowcoinuser}' > /root/.meowcoin/meowcoin.conf && 
      echo 'rpcpassword=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}' >> /root/.meowcoin/meowcoin.conf && 
      echo 'server=1' >> /root/.meowcoin/meowcoin.conf && 
      echo 'listen=1' >> /root/.meowcoin/meowcoin.conf && 
      echo 'rpcallowip=0.0.0.0/0' >> /root/.meowcoin/meowcoin.conf && 
      tail -f /dev/null"

  # API Service
  api:
    image: node:18-alpine
    volumes:
      - ./packages/api:/app
      - ./config:/config:ro
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      - NODE_ENV=production
      - PORT=8080
      - CONFIG_PATH=/config/config.json
      - MEOWCOIN_RPC_USER=${MEOWCOIN_RPC_USER:-meowcoinuser}
      - MEOWCOIN_RPC_PASSWORD=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}
      - MEOWCOIN_RPC_HOST=meowcoin-node
      - MEOWCOIN_RPC_PORT=9332
      - DATABASE_TYPE=${DATABASE_TYPE:-sqlite}
      - DATABASE_HOST=${DATABASE_HOST:-postgres}
      - DATABASE_PORT=${DATABASE_PORT:-5432}
      - DATABASE_NAME=${DATABASE_NAME:-meowcoin}
      - DATABASE_USER=${DATABASE_USER:-postgres}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    restart: unless-stopped
    depends_on:
      - meowcoin-node
    networks:
      - meowcoin-network
    command: >
      sh -c "if [ ! -f /app/package.json ]; then 
        echo 'API service placeholder' > /app/index.js && 
        echo '{\"name\":\"meowcoin-api\",\"version\":\"1.0.0\",\"main\":\"index.js\"}' > /app/package.json; 
      fi && 
      if [ -f /app/package.json ] && [ ! -d /app/node_modules ]; then 
        npm install; 
      fi && 
      if [ -f /app/index.js ]; then 
        node index.js; 
      else 
        echo 'API service is ready but no index.js found. Using placeholder.' && 
        node -e 'const http=require(\"http\");const server=http.createServer((req,res)=>{res.writeHead(200,{\"Content-Type\":\"application/json\"});res.end(JSON.stringify({status:\"ok\",message:\"API service is running\"}))});server.listen(8080,()=>console.log(\"API server running on port 8080\"));'; 
      fi"

  # Database (conditional based on configuration)
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD:-postgres}
      - POSTGRES_USER=${DATABASE_USER:-postgres}
      - POSTGRES_DB=${DATABASE_NAME:-meowcoin}
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - meowcoin-network
    profiles:
      - database
      - full

  # Redis (conditional based on configuration)
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - meowcoin-network
    profiles:
      - database
      - full

  # Monitoring
  grafana:
    image: grafana/grafana:latest
    volumes:
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - meowcoin-network
    profiles:
      - monitoring
      - full

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - meowcoin-network
    profiles:
      - monitoring
      - full

  # Setup Service - handles configuration through the web UI
  setup:
    image: node:18-alpine
    volumes:
      - ./config:/config
      - ./.env:/app/.env
      - ./docker-compose.yml:/app/docker-compose.yml
    working_dir: /app
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=production
      - PORT=3002
    restart: unless-stopped
    networks:
      - meowcoin-network
    command: >
      sh -c "mkdir -p /config && 
      if [ ! -f /config/config.json ]; then 
        echo '{\"setupCompleted\":false,\"database\":{\"type\":\"sqlite\",\"path\":\"/config/meowcoin.db\"},\"node\":{\"name\":\"MeowNode-1\",\"rpcEnabled\":true}}' > /config/config.json; 
      fi && 
      echo 'Setup service running on port 3002' && 
      node -e 'const http=require(\"http\");const fs=require(\"fs\");const url=require(\"url\");const server=http.createServer((req,res)=>{const parsedUrl=url.parse(req.url,true);if(parsedUrl.pathname===\"/api/setup/status\"){const config=JSON.parse(fs.readFileSync(\"/config/config.json\"));res.writeHead(200,{\"Content-Type\":\"application/json\",\"Access-Control-Allow-Origin\":\"*\"});res.end(JSON.stringify({setupCompleted:config.setupCompleted}));}else if(parsedUrl.pathname===\"/api/setup/save\"&&req.method===\"POST\"){let body=\"\";req.on(\"data\",chunk=>{body+=chunk.toString();});req.on(\"end\",()=>{const config=JSON.parse(body);fs.writeFileSync(\"/config/config.json\",JSON.stringify({...JSON.parse(fs.readFileSync(\"/config/config.json\")),setupCompleted:true,...config},null,2));res.writeHead(200,{\"Content-Type\":\"application/json\",\"Access-Control-Allow-Origin\":\"*\"});res.end(JSON.stringify({success:true}));});}else{res.writeHead(404);res.end();}});server.listen(3002,()=>console.log(\"Setup server running on port 3002\"));';"

networks:
  meowcoin-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
  meowcoin_data:
  meowcoin_config: