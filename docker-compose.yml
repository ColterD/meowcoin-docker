services:
  meowcoin:
    image: colterd/meowcoin-docker:latest
    container_name: meowcoin-node
    volumes:
      - meowcoin-data:/home/meowcoin/.meowcoin
    ports:
      - "127.0.0.1:8332:8332"  # Only expose RPC locally
      - "8333:8333"  # P2P can be public
    restart: unless-stopped
    environment:
      - RPC_USER=meowcoin
      - RPC_PASSWORD=changeme  # IMPORTANT: Change this for production!
      - RPC_BIND=127.0.0.1  # Only bind to localhost inside container
      - RPC_ALLOWIP=127.0.0.1  # Only allow local connections
      - MEOWCOIN_OPTS="-printtoconsole"

volumes:
  meowcoin-data:
    name: meowcoin-data