services:
  # Dashboard Frontend with Setup Wizard
  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./packages/dashboard/public:/usr/share/nginx/html
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    restart: unless-stopped

  # MeowCoin Node (Simplified for initial setup)
  meowcoin-node:
    image: alpine:latest
    volumes:
      - meowcoin_data:/root/.meowcoin
      - meowcoin_config:/etc/meowcoin
    ports:
      - "9332:9332" # RPC port
      - "9333:9333" # P2P port
    environment:
      - MEOWCOIN_RPC_USER=${MEOWCOIN_RPC_USER:-meowcoinuser}
      - MEOWCOIN_RPC_PASSWORD=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}
    restart: unless-stopped
    command: >
      /bin/sh -c "echo 'MeowCoin Node Simulator started. In a production environment, this would be a real MeowCoin node.' && 
      mkdir -p /root/.meowcoin && 
      echo 'rpcuser=${MEOWCOIN_RPC_USER:-meowcoinuser}' > /root/.meowcoin/meowcoin.conf && 
      echo 'rpcpassword=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}' >> /root/.meowcoin/meowcoin.conf && 
      echo 'server=1' >> /root/.meowcoin/meowcoin.conf && 
      echo 'listen=1' >> /root/.meowcoin/meowcoin.conf && 
      echo 'rpcallowip=0.0.0.0/0' >> /root/.meowcoin/meowcoin.conf && 
      tail -f /dev/null"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_MULTIPLE_DATABASES=meowcoin_auth,meowcoin_blockchain,meowcoin_analytics,meowcoin_notifications
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ for message queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    restart: unless-stopped

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  # API Service for Setup Wizard
  api:
    image: node:20-alpine
    ports:
      - "3002:3002"
    volumes:
      - ./:/app
      - ./.env:/app/.env
    working_dir: /app
    command: >
      /bin/sh -c "echo 'Starting MeowCoin Platform API...' &&
      mkdir -p /app/logs &&
      echo '{\"name\":\"meowcoin-platform-api\",\"version\":\"1.0.0\",\"main\":\"index.js\"}' > /app/package.json &&
      echo 'const http = require(\"http\"); const fs = require(\"fs\"); const path = require(\"path\"); const server = http.createServer((req, res) => { if (req.method === \"POST\" && req.url === \"/api/setup\") { let body = \"\"; req.on(\"data\", chunk => { body += chunk.toString(); }); req.on(\"end\", () => { try { const config = JSON.parse(body); fs.writeFileSync(\"/app/.env\", generateEnvFile(config)); res.writeHead(200, {\"Content-Type\": \"application/json\"}); res.end(JSON.stringify({success: true, message: \"Configuration saved successfully\"})); } catch (error) { res.writeHead(500, {\"Content-Type\": \"application/json\"}); res.end(JSON.stringify({success: false, message: error.message})); } }); } else if (req.url === \"/api/setup/status\") { res.writeHead(200, {\"Content-Type\": \"application/json\"}); res.end(JSON.stringify({setupCompleted: false})); } else { res.writeHead(404, {\"Content-Type\": \"application/json\"}); res.end(JSON.stringify({success: false, message: \"Not found\"})); } }); function generateEnvFile(config) { let env = \"# MeowCoin Platform Configuration\\n\\n\"; env += \"# Generated on \" + new Date().toISOString() + \"\\n\\n\"; env += \"# Database\\n\"; if (config.database.type === \"sqlite\") { env += \"DATABASE_TYPE=sqlite\\n\"; env += \"DATABASE_PATH=/data/meowcoin.db\\n\\n\"; } else if (config.database.type === \"builtin\") { env += \"DATABASE_TYPE=postgresql\\n\"; env += \"POSTGRES_USER=postgres\\n\"; env += \"POSTGRES_PASSWORD=postgres\\n\"; env += \"POSTGRES_HOST=postgres\\n\"; env += \"POSTGRES_PORT=5432\\n\\n\"; } else { env += \"DATABASE_TYPE=postgresql\\n\"; env += \"POSTGRES_USER=\" + (config.database.user || \"postgres\") + \"\\n\"; env += \"POSTGRES_PASSWORD=\" + (config.database.password || \"postgres\") + \"\\n\"; env += \"POSTGRES_HOST=\" + (config.database.host || \"localhost\") + \"\\n\"; env += \"POSTGRES_PORT=\" + (config.database.port || \"5432\") + \"\\n\\n\"; } env += \"# MeowCoin Node\\n\"; env += \"MEOWCOIN_RPC_USER=\" + (config.node.rpcUser || \"meowcoinuser\") + \"\\n\"; env += \"MEOWCOIN_RPC_PASSWORD=\" + (config.node.rpcPassword || \"meowcoinpassword\") + \"\\n\"; env += \"MEOWCOIN_DATA_DIR=\" + (config.node.dataDir || \"/data/meowcoin\") + \"\\n\"; env += \"MEOWCOIN_TESTNET=\" + (config.node.testnet ? \"true\" : \"false\") + \"\\n\\n\"; env += \"# Security\\n\"; env += \"JWT_SECRET=\" + (config.security.jwtSecret || \"meowcoin_platform_secret_key_change_in_production\") + \"\\n\"; env += \"ADMIN_PASSWORD=\" + (config.security.adminPassword || \"admin\") + \"\\n\"; env += \"GRAFANA_ADMIN_PASSWORD=\" + (config.security.grafanaPassword || \"admin\") + \"\\n\"; env += \"ENABLE_MFA=\" + (config.security.enableMfa ? \"true\" : \"false\") + \"\\n\"; env += \"ENABLE_RATE_LIMIT=\" + (config.security.enableRateLimit ? \"true\" : \"false\") + \"\\n\\n\"; env += \"# Features\\n\"; env += \"ENABLE_ANALYTICS=\" + (config.features.analytics ? \"true\" : \"false\") + \"\\n\"; env += \"ENABLE_NOTIFICATIONS=\" + (config.features.notifications ? \"true\" : \"false\") + \"\\n\"; env += \"ENABLE_MONITORING=\" + (config.features.monitoring ? \"true\" : \"false\") + \"\\n\"; env += \"ENABLE_AUTO_BACKUP=\" + (config.features.autoBackup ? \"true\" : \"false\") + \"\\n\\n\"; if (config.features.notifications && config.features.smtp.host) { env += \"# Email Notifications\\n\"; env += \"SMTP_HOST=\" + (config.features.smtp.host || \"\") + \"\\n\"; env += \"SMTP_PORT=\" + (config.features.smtp.port || \"587\") + \"\\n\"; env += \"SMTP_USER=\" + (config.features.smtp.user || \"\") + \"\\n\"; env += \"SMTP_PASSWORD=\" + (config.features.smtp.password || \"\") + \"\\n\"; } return env; } server.listen(3002, () => { console.log(\"API server running on port 3002\"); })' > /app/index.js &&
      node /app/index.js"
    restart: unless-stopped
    depends_on:
      - dashboard

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  grafana_data:
  meowcoin_data:
  meowcoin_config: