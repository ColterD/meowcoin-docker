services:
  # Dashboard Frontend (Simplified for initial setup)
  dashboard:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./packages/dashboard/public:/usr/share/nginx/html
    environment:
      - NGINX_HOST=localhost
      - NGINX_PORT=80
    restart: unless-stopped
    command: >
      /bin/sh -c "echo '<html><head><title>MeowCoin Platform</title><style>body{font-family:Arial,sans-serif;line-height:1.6;margin:40px;max-width:800px;margin:0 auto;padding:20px}h1{color:#3498db}pre{background:#f4f4f4;padding:15px;border-radius:5px}</style></head><body><h1>MeowCoin Platform</h1><p>Welcome to the MeowCoin Platform! This is a temporary landing page while the full platform is being set up.</p><p>Please check the setup instructions in the welcome.txt file.</p><pre>$(cat /welcome.txt)</pre></body></html>' > /usr/share/nginx/html/index.html && nginx -g 'daemon off;'"
    volumes:
      - ./welcome.txt:/welcome.txt:ro

  # MeowCoin Node (Simplified for initial setup)
  meowcoin-node:
    image: alpine:latest
    volumes:
      - meowcoin_data:/root/.meowcoin
      - meowcoin_config:/etc/meowcoin
    ports:
      - "9332:9332" # RPC port
      - "9333:9333" # P2P port
    environment:
      - MEOWCOIN_RPC_USER=${MEOWCOIN_RPC_USER:-meowcoinuser}
      - MEOWCOIN_RPC_PASSWORD=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}
    restart: unless-stopped
    command: >
      /bin/sh -c "echo 'MeowCoin Node Simulator started. In a production environment, this would be a real MeowCoin node.' && 
      mkdir -p /root/.meowcoin && 
      echo 'rpcuser=${MEOWCOIN_RPC_USER:-meowcoinuser}' > /root/.meowcoin/meowcoin.conf && 
      echo 'rpcpassword=${MEOWCOIN_RPC_PASSWORD:-meowcoinpassword}' >> /root/.meowcoin/meowcoin.conf && 
      echo 'server=1' >> /root/.meowcoin/meowcoin.conf && 
      echo 'listen=1' >> /root/.meowcoin/meowcoin.conf && 
      echo 'rpcallowip=0.0.0.0/0' >> /root/.meowcoin/meowcoin.conf && 
      tail -f /dev/null"

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/postgres/init:/docker-entrypoint-initdb.d
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_MULTIPLE_DATABASES=meowcoin_auth,meowcoin_blockchain,meowcoin_analytics,meowcoin_notifications
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # RabbitMQ for message queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    restart: unless-stopped

  # Grafana for metrics visualization
  grafana:
    image: grafana/grafana:latest
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped

  # Setup Helper Service
  setup-helper:
    image: alpine:latest
    volumes:
      - ./:/app
    working_dir: /app
    command: >
      /bin/sh -c "echo '=======================================' &&
      echo '   MeowCoin Platform Setup Complete   ' &&
      echo '=======================================' &&
      echo 'Your MeowCoin Platform is now running in simplified mode.' &&
      echo 'Access the dashboard at: http://localhost:3000' &&
      echo 'Access Grafana at: http://localhost:3001 (admin/admin)' &&
      echo 'Access RabbitMQ at: http://localhost:15672 (guest/guest)' &&
      echo '' &&
      echo 'To enable full functionality:' &&
      echo '1. Review and update the .env file' &&
      echo '2. Run the setup.sh script: ./setup.sh' &&
      echo '3. Switch to the full docker-compose file: mv docker-compose.full.yml docker-compose.yml' &&
      echo '4. Restart the platform: docker-compose down && docker-compose up -d' &&
      echo '' &&
      echo 'For more information, see the documentation in the /docs directory.' &&
      echo '=======================================' &&
      sleep 5"

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  grafana_data:
  meowcoin_data:
  meowcoin_config: