services:
  meowcoin:
    build:
      context: .
      dockerfile: Dockerfile
    image: meowcoin:latest
    container_name: meowcoin-node
    restart: unless-stopped
    volumes:
      - meowcoin-data:/data
      - ./config:/config
      # Limit Docker socket permissions with read-only flag
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "${RPC_PORT:-9766}:9766"  # RPC port
      - "${P2P_PORT:-8788}:8788"  # P2P port
      - "${WEB_PORT:-8080}:8080"  # Web UI
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - MEOWCOIN_MODE=${MEOWCOIN_MODE:-full}
      - MEOWCOIN_OPTIONS=${MEOWCOIN_OPTIONS:-}
      - SYSTEM_MEMORY=${SYSTEM_MEMORY:-auto}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-auto}
      - ENABLE_TXINDEX=${ENABLE_TXINDEX:-1}
      - AUTO_UPDATE=${AUTO_UPDATE:-security}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-daily}
    # Add resource limits to prevent container from consuming excessive resources
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
    healthcheck:
      test: ["CMD", "/scripts/healthcheck.sh"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # Add security options
    security_opt:
      - no-new-privileges:true

volumes:
  meowcoin-data:
    driver: local