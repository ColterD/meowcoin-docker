# docker-compose.yml

services:
  meowcoin:
    image: colterd/meowcoin-docker:${MEOWCOIN_VERSION:-2.0.5}
    container_name: meowcoin-node
    volumes:
      - meowcoin-data:/home/meowcoin/.meowcoin
      - ./security/seccomp-profile.json:/etc/docker/seccomp-profile.json:ro
      - ./security/apparmor-profile:/etc/apparmor.d/docker-meowcoin:ro
    ports:
      - "127.0.0.1:8332:8332"  # Only expose RPC locally
      - "8333:8333"  # P2P can be public
    restart: unless-stopped
    environment:
      # CORE SETTINGS
      - RPC_BIND=127.0.0.1
      - RPC_ALLOWIP=127.0.0.1
      
    # RESOURCE SETTINGS automatically optimized if not set
    tmpfs:
      - /tmp:exec,size=128m
      - /var/run:size=32m
    read_only: true
    security_opt:
      - seccomp=/etc/docker/seccomp-profile.json
      - apparmor=docker-meowcoin
      - no-new-privileges=true
    
    secrets:
      - meowcoin_rpc_password
      - meowcoin_jwt_key
      - meowcoin_backup_key
    
    # SECURITY FEATURES
    environment:
      - ENABLE_SSL=true
      - ENABLE_FAIL2BAN=true
      - ENABLE_JWT_AUTH=true
      - ENABLE_READONLY_FS=true
      
      # MONITORING FEATURES
      - ENABLE_METRICS=true
      - TZ=UTC
      
      # BACKUP FEATURES
      - ENABLE_BACKUPS=true
      - BACKUP_SCHEDULE="0 0 * * *"  # Daily at midnight
      - MAX_BACKUPS=7
      - BACKUP_COMPRESSION_LEVEL=6
      - BACKUP_REMOTE_ENABLED=false
      
      # ADVANCED SECURITY
      - ENABLE_SECCOMP=true
      - ENABLE_APPARMOR=true
      - PLUGINS_ISOLATION=true
      
      # STORAGE OPTIMIZATION
      - ENABLE_PRUNING=true
      - PRUNING_KEEP_BLOCKS=10000
      
      # VERSION MANAGEMENT
      - ROLLBACK_ENABLED=true
      - BACKUP_BEFORE_UPDATE=true
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '0.5'
    
    # Health check (used by Docker)
    healthcheck:
      test: ["CMD", "/usr/local/bin/monitoring/health-check.sh"]
      interval: 5m
      timeout: 30s
      retries: 3
      start_period: 30m

  # Optional Prometheus monitoring stack
  prometheus:
    image: prom/prometheus:latest
    container_name: meowcoin-prometheus
    volumes:
      - ./config/prometheus:/etc/prometheus
      - prometheus-data:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    depends_on:
      - meowcoin
    profiles: ["monitoring"]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: meowcoin-grafana
    volumes:
      - ./config/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
    profiles: ["monitoring"]
    restart: unless-stopped

volumes:
  meowcoin-data:
    name: meowcoin-data
  prometheus-data:
    name: meowcoin-prometheus-data
  grafana-data:
    name: meowcoin-grafana-data

secrets:
  meowcoin_rpc_password:
    file: ./security/secrets/rpc_password.txt
  meowcoin_jwt_key:
    file: ./security/secrets/jwt_key.txt
  meowcoin_backup_key:
    file: ./security/secrets/backup_key.txt