services:
  meowcoin:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meowcoin-node
    volumes:
      - meowcoin-data:/home/meowcoin/.meowcoin
    ports:
      - "127.0.0.1:8332:8332"
      - "8333:8333"
      - "9449:9449"
      - "3001:3001"
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
    environment:
      - RPC_BIND=127.0.0.1
      - RPC_ALLOWIP=127.0.0.1
      - ENABLE_SSL=false
      - ENABLE_FAIL2BAN=false
      - ENABLE_JWT_AUTH=false
      - ENABLE_READONLY_FS=false
      - ENABLE_METRICS=false
      - TZ=UTC
      - ENABLE_BACKUPS=false
      - ENABLE_PLUGINS=false
      - BTCEXP_ADDRESS_API=none
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: 2
    security_opt:
      - no-new-privileges=true
    read_only: false
    tmpfs:
      - /tmp:exec,size=128m
      - /var/run:size=32m

volumes:
  meowcoin-data: