services:
  meowcoin:
    build:
      context: .
      dockerfile: Dockerfile
    image: meowcoin:latest
    container_name: meowcoin-node
    volumes:
      - meowcoin-data:/home/meowcoin/.meowcoin
      - ./config:/config
    ports:
      - "9766:9766"  # RPC port
      - "8788:8788"  # P2P port
    restart: unless-stopped
    environment:
      - TZ=UTC  # Set your timezone here

volumes:
  meowcoin-data: