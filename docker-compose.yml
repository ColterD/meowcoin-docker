services:
  meowcoin:
    build:
      context: .
      dockerfile: Dockerfile
    image: meowcoin:2.0.5
    container_name: meowcoin-node
    restart: unless-stopped
    volumes:
      - meowcoin-data:/data
      - ./config:/config:ro
    ports:
      - "${RPC_PORT:-9766}:9766"
      - "${P2P_PORT:-8788}:8788"
      - "${WEB_PORT:-8080}:8080"
    environment:
      - MEOWCOIN_MODE=${MEOWCOIN_MODE:-full}
      - MEOWCOIN_OPTIONS=${MEOWCOIN_OPTIONS:--maxmempool=500 -disablewallet=0}
      - SYSTEM_MEMORY=${SYSTEM_MEMORY:-auto}
      - MAX_CONNECTIONS=${MAX_CONNECTIONS:-auto}
      - ENABLE_TXINDEX=${ENABLE_TXINDEX:-1}
      - AUTO_UPDATE=${AUTO_UPDATE:-security}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_INTERVAL=${BACKUP_INTERVAL:-daily}
      - BACKUP_DIRECTORY=${BACKUP_DIRECTORY:-/data/backups}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - RPC_PASSWORD_FILE=/data/.meowcoin/rpc.pass  # New: Specify RPC password file
    security_opt:
      - no-new-privileges
    cap_drop:
      - NET_ADMIN
      - SYS_ADMIN
    healthcheck:
      test: ["CMD", "/scripts/healthcheck.sh"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  meowcoin-data:
    driver: local