name: Meowcoin Auto-Update

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Check for new Meowcoin version
        id: version_check
        run: |
          chmod +x ./version_check.sh
          ./version_check.sh
          if [ $? -eq 0 ]; then
            echo "::set-output name=version_changed::true"
            echo "::set-output name=version::$(cat meowcoin_version.txt)"
          else
            echo "::set-output name=version_changed::false"
          fi
      
      - name: Set up Docker Buildx
        if: steps.version_check.outputs.version_changed == 'true'
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        if: steps.version_check.outputs.version_changed == 'true'
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Build and push
        if: steps.version_check.outputs.version_changed == 'true'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            colterd/meowcoin:latest
            colterd/meowcoin:${{ steps.version_check.outputs.version }}
          cache-from: type=registry,ref=colterd/meowcoin:buildcache
          cache-to: type=registry,ref=colterd/meowcoin:buildcache,mode=max