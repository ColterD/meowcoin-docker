name: Meowcoin Auto-Update and Build

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:  # Allow manual trigger

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}
      new_version: ${{ steps.version_check.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Check for new Meowcoin version
        id: version_check
        run: |
          chmod +x ./version_check.sh
          export GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          ./version_check.sh

  build-and-push:
    needs: check-and-build
    if: needs.check-and-build.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract version components
        id: version
        run: |
          VERSION=${{ needs.check-and-build.outputs.new_version }}
          VERSION_NUMBER=${VERSION#Meow-v}
          echo "full_version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_number=$VERSION_NUMBER" >> $GITHUB_OUTPUT
          
      - name: Build and push for ${{ matrix.platform }}
        uses: docker/build-push-action@v4
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            colterd/meowcoin-docker:latest
            colterd/meowcoin-docker:${{ steps.version.outputs.full_version }}
            colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}
          cache-from: type=registry,ref=colterd/meowcoin-docker:buildcache
          cache-to: type=registry,ref=colterd/meowcoin-docker:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            
      - name: Scan Docker image for vulnerabilities
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'colterd/meowcoin-docker:${{ steps.version.outputs.full_version }}'
          format: 'table'
          exit-code: '1'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
        continue-on-error: true
      
  notify:
    needs: [check-and-build, build-and-push]
    if: ${{ always() && needs.check-and-build.outputs.version_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        id: check
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=🎉 Successfully built and pushed Meowcoin ${{ needs.check-and-build.outputs.new_version }}" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Failed to build Meowcoin ${{ needs.check-and-build.outputs.new_version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Update build status
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Build ${{ steps.check.outputs.status }}: Meowcoin ${{ needs.check-and-build.outputs.new_version }}',
              body: '${{ steps.check.outputs.message }}',
              labels: ['automated', 'build-status']
            });