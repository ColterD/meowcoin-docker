# .github/workflows/docker-build.yml
name: Meowcoin Auto-Update and Build

on:
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours
  workflow_dispatch:  # Allow manual trigger
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'docs/**'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}
      new_version: ${{ steps.version_check.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Check for new Meowcoin version
        id: version_check
        run: |
          # Install dependencies for better error handling
          sudo apt-get update && sudo apt-get install -y jq bc curl
          chmod +x ./utils/version_check.sh
          export GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}
          ./utils/version_check.sh
        
      - name: Upload version check logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: version-check-logs
          path: version_check_*.log
          retention-days: 7

  test-build:
    needs: check-version
    if: needs.check-version.outputs.version_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
        
      - name: Extract version components
        id: version
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          VERSION_NUMBER=${VERSION#Meow-v}
          echo "full_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
      
      - name: Install Hadolint
        run: |
          wget -O /tmp/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /tmp/hadolint
      
      - name: Lint Dockerfile
        run: |
          /tmp/hadolint build/Dockerfile
      
      - name: Build test image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/Dockerfile
          push: false
          load: true
          tags: meowcoin-docker:test
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            MEOWCOIN_VERSION=${{ steps.version.outputs.full_version }}
      
      - name: Run structure tests
        run: |
          # Create container-structure-test config
          cat > config.yaml <<EOF
          schemaVersion: '2.0.0'
          commandTests:
            - name: "Meowcoin CLI Version"
              command: "meowcoin-cli"
              args: ["-version"]
              expectedOutput: [".*${{ steps.version.outputs.version_number }}.*"]
            - name: "User exists"
              command: "id"
              args: ["meowcoin"]
              expectedOutput: ["uid=1000(meowcoin).*"]
            - name: "Supervisor is installed"
              command: "supervisord"
              args: ["-v"]
            - name: "Fail2ban is installed"
              command: "fail2ban-server"
              args: ["-V"]
          fileExistenceTests:
            - name: "Entrypoint script"
              path: "/entrypoint.sh"
              shouldExist: true
              permissions: "-rwxr-xr-x"
            - name: "Configuration template"
              path: "/etc/meowcoin/templates/meowcoin.conf.template"
              shouldExist: true
            - name: "Meowcoin binary"
              path: "/usr/bin/meowcoind"
              shouldExist: true
              permissions: "-rwxr-xr-x"
          EOF
          
          # Install container-structure-test
          curl -LO https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x container-structure-test-linux-amd64
          sudo mv container-structure-test-linux-amd64 /usr/local/bin/container-structure-test
          
          # Run tests
          container-structure-test test --image meowcoin-docker:test --config config.yaml
      
      - name: Functional test
        run: |
          # Start container
          docker run -d --name meowcoin-test meowcoin-docker:test
          
          # Wait for container to initialize
          sleep 10
          
          # Check if container is running
          docker ps | grep meowcoin-test
          
          # Check logs for errors
          docker logs meowcoin-test | grep -i error || true
          
          # Run health check
          docker exec meowcoin-test /usr/local/bin/monitoring/health-check.sh || true
          
          # Stop container
          docker stop meowcoin-test
          docker rm meowcoin-test

  security-scan:
    needs: [check-version, test-build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Extract version components
        id: version
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          VERSION_NUMBER=${VERSION#Meow-v}
          echo "full_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
      
      - name: Build test image for scanning
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/Dockerfile
          push: false
          load: true
          tags: meowcoin-docker:scan
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            MEOWCOIN_VERSION=${{ steps.version.outputs.full_version }}
            
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'meowcoin-docker:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          
      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
          
      - name: Run Grype vulnerability scanner
        uses: anchore/scan-action@v3
        with:
          image: "meowcoin-docker:scan"
          fail-build: false
          severity-cutoff: high
          output-format: sarif
          
      - name: Analyze vulnerability results
        id: analyze
        run: |
          # Extract critical and high vulnerabilities count from Trivy
          TRIVY_CRITICAL_COUNT=$(grep -c "CRITICAL" trivy-results.sarif || echo "0")
          TRIVY_HIGH_COUNT=$(grep -c "HIGH" trivy-results.sarif || echo "0")
          
          # Extract from Grype
          GRYPE_CRITICAL_COUNT=$(jq '.runs[0].results[] | select(.level=="critical") | .level' < anchore-scan-results.sarif | wc -l || echo "0")
          GRYPE_HIGH_COUNT=$(jq '.runs[0].results[] | select(.level=="high") | .level' < anchore-scan-results.sarif | wc -l || echo "0")
          
          # Total counts
          CRITICAL_COUNT=$((TRIVY_CRITICAL_COUNT + GRYPE_CRITICAL_COUNT))
          HIGH_COUNT=$((TRIVY_HIGH_COUNT + GRYPE_HIGH_COUNT))
          
          echo "critical_vulns=${CRITICAL_COUNT}" >> $GITHUB_OUTPUT
          echo "high_vulns=${HIGH_COUNT}" >> $GITHUB_OUTPUT
          
          # Generate report
          echo "### Security Scan Results" > security-report.md
          echo "" >> security-report.md
          echo "| Severity | Count |" >> security-report.md
          echo "|----------|-------|" >> security-report.md
          echo "| Critical | ${CRITICAL_COUNT} |" >> security-report.md
          echo "| High     | ${HIGH_COUNT} |" >> security-report.md
          
          # Generate complete vulnerability list
          echo "" >> security-report.md
          echo "#### Critical Vulnerabilities" >> security-report.md
          jq -r '.runs[0].results[] | select(.level=="critical") | "- " + .message.text' anchore-scan-results.sarif >> security-report.md || echo "None found" >> security-report.md
          
          # Fail the build if critical vulnerabilities are found
          if [ $CRITICAL_COUNT -gt 0 ]; then
            echo "::error::Found ${CRITICAL_COUNT} critical vulnerabilities"
            exit 1
          fi
          
          if [ $HIGH_COUNT -gt 5 ]; then
            echo "::warning::Found ${HIGH_COUNT} high vulnerabilities"
          fi
      
      - name: Upload security report
        uses: actions/upload-artifact@v3
        with:
          name: security-report
          path: security-report.md
          retention-days: 7

  build-and-push:
    needs: [check-version, test-build, security-scan]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        platform: [linux/amd64, linux/arm64]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Extract version components
        id: version
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          VERSION_NUMBER=${VERSION#Meow-v}
          echo "full_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
          
      - name: Build and push for ${{ matrix.platform }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./build/Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: |
            colterd/meowcoin-docker:${{ steps.version.outputs.full_version }}
            colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}
            ${{ matrix.platform == 'linux/amd64' && format('colterd/meowcoin-docker:{0}-amd64', steps.version.outputs.version_number) || format('colterd/meowcoin-docker:{0}-arm64', steps.version.outputs.version_number) }}
          cache-from: type=registry,ref=colterd/meowcoin-docker:buildcache
          cache-to: type=registry,ref=colterd/meowcoin-docker:buildcache,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            MEOWCOIN_VERSION=${{ steps.version.outputs.full_version }}
          labels: |
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}
            org.opencontainers.image.version=${{ steps.version.outputs.version_number }}
            org.opencontainers.image.revision=${{ github.sha }}
            
      - name: Scan final image
        if: matrix.platform == 'linux/amd64'
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}'
          format: 'table'
          exit-code: '0'
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'
            
  create-multi-arch-manifest:
    needs: [check-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Extract version components
        id: version
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          VERSION_NUMBER=${VERSION#Meow-v}
          echo "full_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
      
      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      
      - name: Create and push manifest
        run: |
          # Create manifest for version tag
          docker manifest create colterd/meowcoin-docker:${{ steps.version.outputs.version_number }} \
            colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}-amd64 \
            colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}-arm64
          
          docker manifest push colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}
          
          # Create manifest for latest tag
          docker manifest create colterd/meowcoin-docker:latest \
            colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}-amd64 \
            colterd/meowcoin-docker:${{ steps.version.outputs.version_number }}-arm64
          
          docker manifest push colterd/meowcoin-docker:latest
      
  generate-sbom:
    needs: [check-version, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Extract version components
        id: version
        run: |
          VERSION=${{ needs.check-version.outputs.new_version }}
          VERSION_NUMBER=${VERSION#Meow-v}
          echo "full_version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_number=${VERSION_NUMBER}" >> $GITHUB_OUTPUT
      
      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Generate SBOM
        run: |
          syft colterd/meowcoin-docker:${{ steps.version.outputs.version_number }} -o spdx-json=sbom.json
      
      - name: Upload SBOM
        uses: actions/upload-artifact@v3
        with:
          name: sbom
          path: sbom.json
          retention-days: 30
      
  notify:
    needs: [check-version, test-build, security-scan, build-and-push, create-multi-arch-manifest, generate-sbom]
    if: ${{ always() && needs.check-version.outputs.version_changed == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check build status
        id: check
        run: |
          if [ "${{ needs.build-and-push.result }}" = "success" ] && [ "${{ needs.create-multi-arch-manifest.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=🎉 Successfully built and pushed Meowcoin ${{ needs.check-version.outputs.new_version }}" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Failed to build Meowcoin ${{ needs.check-version.outputs.new_version }}" >> $GITHUB_OUTPUT
          fi
      
      - name: Update build status
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Build ${{ steps.check.outputs.status }}: Meowcoin ${{ needs.check-version.outputs.new_version }}',
              body: '${{ steps.check.outputs.message }}',
              labels: ['automated', 'build-status']
            });
            
      - name: Download security report
        if: needs.security-scan.result == 'success'
        uses: actions/download-artifact@v3
        with:
          name: security-report
            
      - name: Create release
        if: steps.check.outputs.status == 'success'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let securityReport = '';
            
            try {
              if (fs.existsSync('security-report.md')) {
                securityReport = fs.readFileSync('security-report.md', 'utf8');
              }
            } catch (err) {
              console.error('Error reading security report:', err);
            }
            
            const releaseNotes = `## Meowcoin ${process.env.VERSION}
            
            Automated release for Meowcoin ${process.env.VERSION}
            
            ### Changes
            - Updated to Meowcoin Core ${process.env.VERSION}
            - Security improvements
            - Performance optimizations
            
            ### Docker Images
            - \`colterd/meowcoin-docker:${process.env.VERSION}\`
            - \`colterd/meowcoin-docker:latest\`
            
            ### Platforms
            - linux/amd64
            - linux/arm64
            
            ${securityReport}
            `;
            
            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: process.env.VERSION,
              name: `Meowcoin ${process.env.VERSION}`,
              body: releaseNotes,
              draft: false,
              prerelease: false
            });
          env:
            VERSION: ${{ needs.check-version.outputs.new_version }}
            
      - name: Publish SBOM
        if: steps.check.outputs.status == 'success'
        uses: actions/download-artifact@v3
        with:
          name: sbom
            
      - name: Upload SBOM to release
        if: steps.check.outputs.status == 'success'
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });
            
            if (releases.data.length > 0) {
              const releaseId = releases.data[0].id;
              
              // Upload SBOM to release
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: releaseId,
                name: 'sbom.json',
                data: fs.readFileSync('sbom.json')
              });
            }
          
      - name: Notify via webhook
        if: always()
        continue-on-error: true
        uses: distributhor/workflow-webhook@v3
        with:
          webhook_url: ${{ secrets.WEBHOOK_URL }}
          webhook_secret: ${{ secrets.WEBHOOK_SECRET }}
          data: '{"version": "${{ needs.check-version.outputs.new_version }}", "status": "${{ steps.check.outputs.status }}", "message": "${{ steps.check.outputs.message }}"}'