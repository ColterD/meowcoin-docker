global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "api_gateway"
    static_configs:
      - targets: ["api-gateway:8080"]

  - job_name: "auth_service"
    static_configs:
      - targets: ["auth-service:3001"]

  - job_name: "blockchain_service"
    static_configs:
      - targets: ["blockchain-service:3002"]

  - job_name: "analytics_service"
    static_configs:
      - targets: ["analytics-service:3003"]

  - job_name: "notification_service"
    static_configs:
      - targets: ["notification-service:3004"]

  - job_name: "dashboard"
    static_configs:
      - targets: ["dashboard:3000"]

  - job_name: "meowcoin_node"
    static_configs:
      - targets: ["meowcoin-node:9332"]

  - job_name: "postgres"
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: "rabbitmq"
    static_configs:
      - targets: ["rabbitmq:15692"]

  - job_name: "node_exporter"
    static_configs:
      - targets: ["node-exporter:9100"]