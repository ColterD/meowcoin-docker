apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  - name: TimescaleDB
    type: postgres
    url: timescaledb:5432
    database: meowcoin_metrics
    user: postgres
    secureJsonData:
      password: postgres
    jsonData:
      sslmode: "disable"
      timescaledb: true
    editable: false