<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeowCoin Platform</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 0;
            color: #333;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        
        .container {
            text-align: center;
            max-width: 600px;
            padding: 20px;
        }
        
        .logo {
            font-size: 3em;
            color: #3498db;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #3498db;
            margin-bottom: 20px;
        }
        
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 30px 0;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #3498db;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 2s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .btn {
            display: inline-block;
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: background-color 0.3s;
        }
        
        .btn:hover {
            background-color: #2980b9;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🐱</div>
        <h1>MeowCoin Platform</h1>
        <p>Welcome to the MeowCoin Platform! We're checking your setup...</p>
        
        <div class="loading">
            <div class="spinner"></div>
            <p>Initializing platform...</p>
        </div>
        
        <a href="/setup.html" class="btn" style="display: none;">Go to Setup Wizard</a>
    </div>

    <script>
        // Simulate checking setup status
        // In a real implementation, this would be an API call
        setTimeout(() => {
            // Hide loading spinner
            document.querySelector('.loading').style.display = 'none';
            
            // Show setup wizard button
            document.querySelector('.btn').style.display = 'inline-block';
            
            // Automatically redirect to setup wizard after a short delay
            setTimeout(() => {
                window.location.href = '/setup.html';
            }, 1500);
        }, 2000);
    </script>
</body>
</html>
