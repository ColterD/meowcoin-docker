# MeowCoin Configuration File

# Network
server=1
listen=1
port=9333
rpcport=9332

# RPC Settings
rpcuser=${MEOWCOIN_RPC_USER}
rpcpassword=${MEOWCOIN_RPC_PASSWORD}
rpcallowip=0.0.0.0/0
rpcbind=0.0.0.0

# Performance
dbcache=512
maxmempool=300
maxconnections=125
maxuploadtarget=1000

# Indexes
txindex=1
addressindex=1

# Logging
debug=0
printtoconsole=1
logtimestamps=1

# Misc
daemon=0
disablewallet=0
zmqpubhashblock=tcp://0.0.0.0:28332
zmqpubhashtx=tcp://0.0.0.0:28333