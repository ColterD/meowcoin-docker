services:
  dashboard:
    build: .
    container_name: meowcoin-dashboard
    ports:
      - "3000:3000"   # Dashboard web interface
      - "9332:9332"   # RPC port (simulated)
      - "9333:9333"   # P2P port (simulated)
    volumes:
      - node_data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

volumes:
  node_data:
