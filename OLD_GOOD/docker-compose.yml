services:
  meowcoin:
    image: colterd/meowcoin-docker:latest
    container_name: meowcoin-node
    volumes:
      - meowcoin-data:/home/meowcoin/.meowcoin
    ports:
      - "127.0.0.1:8332:8332"  # Only expose RPC locally
      - "8333:8333"  # P2P can be public
      # - "127.0.0.1:9449:9449"  # Prometheus metrics (uncomment if enabled)
    restart: unless-stopped
    environment:
      # CORE SETTINGS
      # RPC settings
      - RPC_BIND=127.0.0.1
      - RPC_ALLOWIP=127.0.0.1
      - MEOWCOIN_OPTS="-printtoconsole"
      
      # OPTIONAL FEATURES - All disabled by default
      # Security features
      - ENABLE_SSL=false
      - ENABLE_FAIL2BAN=false
      
      # Monitoring features
      - ENABLE_METRICS=false
      
      # Backup features
      - ENABLE_BACKUPS=false
      - BACKUP_SCHEDULE="0 0 * * *"
      
      # Advanced security (requires additional setup)
      - ENABLE_JWT_AUTH=false
      - ENABLE_READONLY_FS=false
    
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2'
        reservations:
          memory: 1G
          cpus: '0.5'

volumes:
  meowcoin-data:
    name: meowcoin-data